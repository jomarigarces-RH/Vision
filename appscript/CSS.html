<style>
/* ===== DESIGN TOKENS ===== */
:root {
  --primary: #4F7DF3;
  --primary-light: #6B91F7;
  --primary-dark: #3A66D9;
  --primary-bg: #EBF0FE;
  --accent: #F59E0B;
  --accent-light: #FCD34D;
  --bg-body: #E8EDFB;
  --bg-card: #FFFFFF;
  --bg-sidebar: #F5F7FD;
  --bg-sidebar-active: #FFFFFF;
  --text-primary: #1E293B;
  --text-secondary: #64748B;
  --text-muted: #94A3B8;
  --border: #E2E8F0;
  --border-light: #F1F5F9;
  --shadow-sm: 0 1px 3px rgba(79,125,243,0.06);
  --shadow-md: 0 4px 12px rgba(79,125,243,0.08);
  --shadow-lg: 0 8px 30px rgba(79,125,243,0.12);
  --shadow-card: 0 2px 8px rgba(0,0,0,0.04), 0 0 0 1px rgba(79,125,243,0.04);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --sidebar-w: 200px;
  --sidebar-collapsed-w: 64px;
  --topnav-h: 56px;
  --transition: 0.25s cubic-bezier(.4,0,.2,1);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg-body);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* TOP NAV */
.top-nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--topnav-h);
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; z-index: 100; backdrop-filter: blur(12px);
}
.top-nav-left { display: flex; align-items: center; gap: 16px; }
.top-nav-title { font-weight: 700; font-size: 1.1rem; color: var(--text-primary); }
.top-nav-right { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--bg-card); display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-secondary); transition: var(--transition);
}
.icon-btn:hover { background: var(--primary-bg); color: var(--primary); border-color: var(--primary-light); transform: translateY(-1px); }
.hamburger-btn {
  width: 38px; height: 38px; border-radius: 10px; border: none;
  background: transparent; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-secondary); transition: var(--transition);
}
.hamburger-btn:hover { background: var(--primary-bg); color: var(--primary); }

/* APP LAYOUT */
.app-layout { display: flex; margin-top: var(--topnav-h); min-height: calc(100vh - var(--topnav-h)); }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w); background: var(--bg-sidebar);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  position: fixed; top: var(--topnav-h); bottom: 0; left: 0;
  z-index: 50; transition: width var(--transition); overflow-y: auto; overflow-x: hidden;
}
.sidebar.collapsed { width: var(--sidebar-collapsed-w); }

.sidebar-logo { padding: 20px; display: flex; justify-content: center; }
.logo-icon {
  width: 60px; height: 66px; border-radius: var(--radius-md);
  background: var(--bg-card); display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-md); transition: var(--transition); overflow: hidden; padding: 6px;
}
.sidebar.collapsed .logo-icon { width: 42px; height: 42px; padding: 4px; }
.sidebar.collapsed .logo-icon svg { width: 24px; height: 28px; }
.logo-icon:hover { transform: scale(1.08); }
.sidebar-nav { flex: 1; padding: 4px 12px; display: flex; flex-direction: column; gap: 2px; }
.sidebar.collapsed .sidebar-nav { padding: 4px 8px; }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: var(--radius-sm);
  color: var(--text-secondary); text-decoration: none;
  font-weight: 500; font-size: 0.9rem; transition: var(--transition); position: relative;
  white-space: nowrap; overflow: hidden;
}
.sidebar.collapsed .nav-item { padding: 10px; justify-content: center; }
.nav-item:hover { background: var(--bg-card); color: var(--primary); }
.nav-item.active { background: var(--bg-sidebar-active); color: var(--primary); font-weight: 600; box-shadow: var(--shadow-sm); }
.nav-item.active::before {
  content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 20px; background: var(--primary); border-radius: 0 3px 3px 0;
}

/* Nav labels hide when collapsed */
.nav-label { transition: opacity var(--transition), width var(--transition); }
.sidebar.collapsed .nav-label { opacity: 0; width: 0; overflow: hidden; }

/* Chevron hide when collapsed */
.nav-item .chevron { margin-left: auto; transition: transform var(--transition), opacity var(--transition); flex-shrink: 0; }
.sidebar.collapsed .nav-item .chevron { opacity: 0; width: 0; overflow: hidden; }
.nav-item.has-submenu.open .chevron { transform: rotate(180deg); }

/* Submenu */
.nav-submenu { display: none; padding-left: 28px; }
.nav-submenu.open { display: flex; flex-direction: column; gap: 2px; }
.sidebar.collapsed .nav-submenu { display: none !important; }
.nav-sub-item { padding: 8px 14px; border-radius: var(--radius-sm); color: var(--text-muted); text-decoration: none; font-size: 0.82rem; transition: var(--transition); }
.nav-sub-item:hover { background: var(--primary-bg); color: var(--primary); }
.nav-spacer { height: 20px; }
.nav-group { display: flex; flex-direction: column; }
.sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
.sidebar.collapsed .sidebar-footer { padding: 8px; }

/* Nav icon - always visible */
.nav-icon { flex-shrink: 0; }

/* Tooltip on collapsed sidebar */
.sidebar.collapsed .nav-item { position: relative; }
.sidebar.collapsed .nav-item:hover::after {
  content: attr(data-tooltip);
  position: absolute; left: calc(100% + 8px); top: 50%; transform: translateY(-50%);
  background: var(--text-primary); color: white; padding: 4px 10px; border-radius: 6px;
  font-size: 0.78rem; font-weight: 600; white-space: nowrap; z-index: 200;
  pointer-events: none; box-shadow: var(--shadow-md);
}

/* MAIN CONTENT */
.main-content {
  flex: 1; margin-left: var(--sidebar-w); padding: 24px 28px;
  min-height: calc(100vh - var(--topnav-h)); transition: margin-left var(--transition);
}
.sidebar.collapsed ~ main.main-content,
.main-content.sidebar-collapsed { margin-left: var(--sidebar-collapsed-w); }

.content-header { display: flex; align-items: center; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
.page-title { font-size: 1.6rem; font-weight: 800; color: var(--text-primary); letter-spacing: -0.02em; }
.header-tabs { display: flex; gap: 4px; }
.header-tab {
  padding: 7px 18px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--bg-card); font-weight: 500; font-size: 0.82rem;
  color: var(--text-secondary); cursor: pointer; transition: var(--transition);
}
.header-tab:hover { background: var(--primary-bg); color: var(--primary); border-color: var(--primary-light); }
.header-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
.header-actions { display: flex; gap: 6px; margin-left: auto; }

/* VIEW PANELS */
.view-panel { display: none; animation: fadeIn 0.3s ease; }
.view-panel.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* DASHBOARD GRID */
.dashboard-grid { display: grid; grid-template-columns: 1fr 1fr 300px; gap: 20px; }

/* CARDS */
.card { background: var(--bg-card); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); overflow: hidden; transition: var(--transition); }
.card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.card-header { padding: 18px 20px 4px; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.card-title { font-size: 1rem; font-weight: 700; color: var(--text-primary); }
.card-subtitle { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
.card-header-meta { display: flex; align-items: center; gap: 6px; }
.trend-badge { font-size: 0.72rem; font-weight: 600; padding: 3px 8px; border-radius: 6px; background: #ECFDF5; color: #059669; }
.trend-badge.down { background: #FEF2F2; color: #DC2626; }
.percentage-badge { font-size: 0.82rem; font-weight: 700; color: var(--text-muted); }
.card-body { padding: 8px 20px 20px; }
.card-body canvas { width: 100% !important; height: auto !important; }

/* DONUT CARDS */
.donut-body { display: flex; align-items: center; gap: 16px; }
.donut-stats { flex: 1; display: flex; flex-direction: column; gap: 10px; }
.stat-item { display: flex; flex-direction: column; gap: 2px; }
.stat-label { font-size: 0.78rem; color: var(--text-muted); }
.stat-value { font-size: 1.4rem; font-weight: 800; color: var(--text-primary); }
.stat-value.accent { color: var(--primary); }
.donut-wrapper { position: relative; width: 150px; height: 150px; flex-shrink: 0; }
.donut-center-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-size: 0.7rem; font-weight: 600; color: var(--text-secondary); pointer-events: none; }

/* AGENTS LIST */
.agents-card { grid-row: span 2; }
.agent-list { display: flex; flex-direction: column; gap: 12px; max-height: 520px; overflow-y: auto; padding-right: 4px; }
.agent-list::-webkit-scrollbar { width: 4px; }
.agent-list::-webkit-scrollbar-track { background: transparent; }
.agent-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.agent-entry { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius-md); transition: var(--transition); cursor: pointer; }
.agent-entry:hover { background: var(--primary-bg); }
.agent-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); position: relative; flex-shrink: 0; }
.avatar-wrapper { position: relative; flex-shrink: 0; }
.avatar-badge { position: absolute; bottom: -2px; right: -2px; width: 18px; height: 18px; border-radius: 50%; font-size: 0.55rem; font-weight: 700; color: white; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg-card); }
.avatar-badge.blue { background: var(--primary); }
.avatar-badge.red { background: #EF4444; }
.agent-info { flex: 1; min-width: 0; }
.agent-name { font-weight: 600; font-size: 0.88rem; color: var(--text-primary); }
.agent-desc { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
.agent-actions { display: flex; align-items: center; gap: 6px; }
.check-badge { display: flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 14px; background: var(--primary-bg); color: var(--primary); font-size: 0.72rem; font-weight: 600; }
.check-badge svg { width: 12px; height: 12px; }

/* STAFF / COACHES VIEW */
.staff-view-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.staff-view-title { font-size: 1.4rem; font-weight: 800; }
.staff-list { display: flex; flex-direction: column; gap: 6px; }
.staff-row { display: grid; grid-template-columns: 48px 1fr 80px 120px 30px; align-items: center; gap: 16px; padding: 14px 16px; border-radius: var(--radius-md); background: var(--bg-card); box-shadow: var(--shadow-sm); cursor: pointer; transition: var(--transition); }
.staff-row:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); background: #FAFBFF; }
.staff-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
.staff-avatar-circle { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.82rem; flex-shrink: 0; letter-spacing: 0.03em; }
.staff-info { min-width: 0; }
.staff-name { font-weight: 600; font-size: 0.92rem; }
.staff-desc { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.staff-percent { font-weight: 700; font-size: 0.9rem; color: var(--text-primary); text-align: center; }
.staff-meta { font-size: 0.78rem; color: var(--text-secondary); }
.staff-chevron { color: var(--primary); display: flex; align-items: center; justify-content: center; }

/* MODALS */
.modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 200; opacity: 0; transition: opacity 0.2s ease; }
.modal-overlay.show { display: flex; opacity: 1; }
.modal-container { background: var(--bg-card); border-radius: var(--radius-xl); box-shadow: 0 25px 60px rgba(0,0,0,0.15); width: 90%; max-width: 740px; max-height: 85vh; overflow-y: auto; padding: 36px; animation: modalSlideUp 0.3s ease; }
@keyframes modalSlideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-title { font-size: 1.5rem; font-weight: 800; color: var(--text-primary); letter-spacing: -0.01em; }
.modal-agent-name { font-size: 1.1rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 24px; }
.observation-modal .modal-header-section { display: flex; gap: 32px; }
.modal-left-panel { flex: 1; }
.modal-right-panel { flex: 1; display: flex; flex-direction: column; gap: 16px; }
.modal-section { margin-bottom: 18px; }
.section-label { font-weight: 700; font-size: 0.92rem; margin-bottom: 4px; }
.accent-text { color: var(--primary); }
.section-text { font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; }
.modal-agent-feedback { display: flex; flex-direction: column; gap: 14px; margin-top: 16px; }
.feedback-item { display: flex; gap: 12px; align-items: flex-start; }
.feedback-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.feedback-text { font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; }
.feedback-name { font-weight: 600; color: var(--text-primary); }
.modal-observed-tag { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 0.82rem; color: var(--text-secondary); }
.tag-close { border: none; background: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); }
.modal-agent-detail { display: flex; flex-direction: column; gap: 4px; }
.detail-row { display: flex; align-items: center; justify-content: space-between; }
.detail-label { font-weight: 600; font-size: 0.92rem; }
.detail-value { font-weight: 600; font-size: 0.85rem; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
.detail-sub { font-size: 0.75rem; color: var(--text-muted); }
.clock-btn { align-self: flex-end; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg-card); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-secondary); transition: var(--transition); }
.clock-btn:hover { background: var(--primary-bg); color: var(--primary); }
.modal-assessment-box { padding: 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
.assess-row { display: flex; align-items: center; justify-content: space-between; }
.assess-label { font-size: 0.85rem; color: var(--text-secondary); }
.assess-value-box { display: flex; flex-direction: column; align-items: flex-end; font-size: 0.82rem; color: var(--text-primary); font-weight: 600; padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
.assess-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
.modal-observe-row { display: flex; justify-content: space-between; }
.observe-left, .observe-right { display: flex; flex-direction: column; gap: 2px; }
.observe-label { font-size: 0.78rem; color: var(--text-secondary); }
.observe-value { font-size: 0.82rem; font-weight: 600; color: var(--text-primary); }
.observe-agent-btn { width: 100%; padding: 14px; border-radius: 28px; border: none; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 24px; transition: var(--transition); box-shadow: 0 4px 14px rgba(79,125,243,0.3); }
.observe-agent-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79,125,243,0.4); }
.modal-footer-actions { display: flex; justify-content: center; gap: 24px; margin-top: 16px; }
.modal-action-btn { padding: 8px 24px; border-radius: 20px; border: none; font-weight: 600; font-size: 0.88rem; cursor: pointer; transition: var(--transition); background: none; }
.modal-action-btn.cancel { color: var(--text-muted); }
.modal-action-btn.cancel:hover { color: var(--primary); }
.modal-action-btn.submit { color: var(--primary); }
.modal-action-btn.submit:hover { background: var(--primary-bg); }

/* Rating Modal */
.rating-section { margin: 24px 0; }
.star-rating { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.rating-number { font-size: 1.8rem; font-weight: 800; color: var(--text-primary); min-width: 30px; }
.stars { display: flex; gap: 4px; }
.star { font-size: 2rem; color: #E2E8F0; cursor: pointer; transition: var(--transition); user-select: none; }
.star.filled { color: #FBBF24; }
.star:hover { transform: scale(1.2); }
.slider-section { display: flex; align-items: center; gap: 12px; }
.slider-label { font-size: 1.2rem; font-weight: 700; color: var(--text-primary); min-width: 24px; }
.score-slider { flex: 1; -webkit-appearance: none; appearance: none; height: 6px; border-radius: 3px; background: var(--border); outline: none; }
.score-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--primary); cursor: pointer; border: 3px solid white; box-shadow: 0 2px 6px rgba(79,125,243,0.3); }
.comment-section { display: flex; flex-direction: column; gap: 12px; }
.comment-input { width: 100%; padding: 14px 16px; border-radius: var(--radius-md); border: 1px solid var(--border); font-family: var(--font); font-size: 0.88rem; color: var(--text-primary); resize: vertical; transition: var(--transition); background: var(--bg-card); }
.comment-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,125,243,0.1); }
.comment-input::placeholder { color: var(--text-muted); }

/* RESPONSIVE */
@media (max-width: 1200px) { .dashboard-grid { grid-template-columns: 1fr 1fr; } .agents-card { grid-row: span 1; } }
@media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } .main-content { margin-left: 0 !important; padding: 16px; } .dashboard-grid { grid-template-columns: 1fr; } .observation-modal .modal-header-section { flex-direction: column; } .modal-container { padding: 24px; width: 95%; } .content-header { gap: 12px; } }
</style>
