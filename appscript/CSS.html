<style>
:root {
  --brand:#4F7DF3;--brand-light:#EFF4FF;--brand-dark:#3b66d6;
  --bg:#F8FAFC;--card:#fff;--text:#1E293B;--text2:#64748B;--text3:#94A3B8;
  --border:#E2E8F0;--green:#10B981;--red:#EF4444;--amber:#F59E0B;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
  --radius: 16px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --ease: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px; scroll-behavior: smooth;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:10px}

/* LAYOUT */
.app-shell{display:flex;width:100%;height:100vh;overflow:hidden;position:relative}
.sidebar{width:var(--sidebar-w);background:rgba(255, 255, 255, 0.8);backdrop-filter: blur(12px);border-right:1px solid var(--border);display:none;flex-direction:column;overflow-y:auto;overflow-x:hidden;transition:var(--ease);z-index:100;position:fixed;left:-var(--sidebar-w);top:0;bottom:0;box-shadow:20px 0 50px rgba(0,0,0,0.05)}
.sidebar.mobile-open{display:flex;left:0}
.sidebar.collapsed{display:none} 
.sidebar-logo{padding:24px 16px;display:flex;align-items:center;justify-content:center;position:relative}
.mobile-close{display:none;background:transparent;border:none;color:var(--text2);cursor:pointer;padding:4px;position:absolute;right:10px}
.sidebar-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:25;backdrop-filter:blur(2px)}
.sidebar-overlay.show{display:block}
.sidebar.mobile-open ~ .sidebar-overlay{display:block}
.logo-icon{width:56px;height:60px;background:var(--card);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);padding:6px;transition:var(--ease)}
.sidebar-nav{flex:1;padding:6px 10px;display:flex;flex-direction:column;gap:2px}

.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:var(--text2);text-decoration:none;font-weight:500;font-size:.88rem;transition:var(--ease);cursor:pointer;white-space:nowrap}
.nav-item:hover{background:var(--bg);color:var(--brand)}
.nav-item.active{background:var(--brand-light);color:var(--brand);font-weight:600}
.nav-icon{flex-shrink:0}
.nav-label{transition:var(--ease)}
.chevron{margin-left:auto;transition:transform .2s}
.nav-item.open .chevron{transform:rotate(180deg)}
.nav-submenu{display:none;padding-left:20px;flex-direction:column;gap:1px;border-left:2px solid #f1f5f9;margin-left:20px;margin-top:2px}
.nav-submenu.open{display:flex}
.nav-sub-item{padding:7px 10px;border-radius:6px;color:var(--text3);text-decoration:none;font-size:.82rem;font-weight:500;transition:var(--ease);cursor:pointer;display:flex;align-items:center;gap:6px}
.nav-sub-item:hover,.nav-sub-item.active{background:var(--brand-light);color:var(--brand);font-weight:600}
.nav-group{display:flex;flex-direction:column}

.lob-children{padding-left:18px;display:flex;flex-direction:column;gap:1px;border-left:2px solid #f8fafc;margin-left:8px}
.nav-lob-item{padding:5px 10px;border-radius:6px;color:var(--text3);text-decoration:none;font-size:.78rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:var(--ease)}
.nav-lob-item:hover,.nav-lob-item.active{background:#eff6ff;color:var(--brand);font-weight:600}
.lob-dot{width:7px;height:7px;border-radius:50%}
.lob-dot.sales{background:var(--brand)}.lob-dot.support{background:var(--green)}.lob-dot.specialty{background:var(--amber)}
.lob-count{margin-left:auto;font-size:.7rem;color:var(--text3)}

/* MAIN AREA */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow-y:auto;overflow-x:hidden}

/* HEADER */
.top-header{
  height:var(--header-h);
  background:rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(10px);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  flex-shrink:0;
  z-index:20;
  gap:12px;
  position: sticky;
  top: 0;
}
.header-left{display:flex;align-items:center;gap:12px;min-width:0}
.hamburger-btn{width:40px;height:40px;border-radius:10px;border:none;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:var(--ease);flex-shrink:0}
.hamburger-btn:hover{background:var(--brand-light);color:var(--brand);transform: rotate(90deg)}
.header-title{font-size:1.2rem;font-weight:800;white-space:nowrap;display:flex;align-items:center;letter-spacing:-0.02em}
.title-sep{color:var(--text3);font-weight:300;margin:0 10px;opacity:0.5}
.header-center{flex:1;max-width:500px;min-width:0}
.search-box{position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-box input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 12px 8px 34px;font-size:.88rem;color:var(--text);transition:var(--ease);font-family:var(--font)}
.search-box input:focus{outline:0;border-color:var(--brand);box-shadow:0 0 0 3px rgba(79,125,243,.12);background:var(--card)}
.search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.1);display:none;max-height:350px;overflow-y:auto;z-index:50}
.search-results.show{display:block}
.sr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f8fafc;transition:var(--ease)}
.sr-item:hover{background:var(--bg)}
.sr-item:last-child{border:0}
.sr-name{font-weight:700;font-size:.88rem;color:var(--text)}
.sr-path{font-size:.72rem;color:var(--text3);margin-top:2px}
.sr-badge{font-size:.65rem;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase}

.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.filter-dropdown{position:relative}
.filter-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-weight:600;font-size:.82rem;color:var(--text2);cursor:pointer;transition:var(--ease);font-family:var(--font)}
.filter-btn:hover{background:var(--bg)}
.filter-btn svg:first-child{color:var(--brand)}
.filter-menu{position:absolute;right:0;top:calc(100% + 6px);width:210px;background:#0f172a;border:1px solid #1e293b;border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.25);display:none;padding:6px 0;z-index:50}
.filter-menu.show{display:block}
.fm-item{padding:9px 14px;font-size:.82rem;font-weight:600;color:#cbd5e1;cursor:pointer;display:flex;align-items:center;gap:8px;transition:var(--ease)}
.fm-item:hover{background:#1e293b;color:#fff}
.fm-item.active{color:#fff}
.fm-item .fm-check{margin-left:auto;color:var(--brand);display:none}
.fm-item.active .fm-check{display:block}

.avatar-btn{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#818cf8);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;cursor:pointer;flex-shrink:0}

/* CONTENT */
.content-area{flex:1;overflow-y:auto;padding:20px;scroll-behavior:smooth}
.view-panel{display:none;}
.view-panel.active{display:block}

/* DASHBOARD GRID */
.dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;max-width:1400px;margin:0 auto}
.dash-col{display:flex;flex-direction:column;gap:18px}

/* CARDS */
.card{
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: box-shadow 0.3s ease, border-color 0.3s ease; /* Avoid transform/opacity conflict with GSAP */
  position: relative;
}
.card:hover{
  transform: translateY(-5px);
  box-shadow: var(--shadow-lg);
  border-color: rgba(79, 125, 243, 0.3);
}
.card-head{padding:20px 20px 8px;display:flex;justify-content:space-between;align-items:flex-start}
.card-head h2{font-size:1.1rem;font-weight:800;letter-spacing:-0.01em}
.card-sub{font-size:0.75rem;color:var(--text3);margin-top:4px}
.card-body{padding:8px 20px 20px}
.pill-btn{font-size:.68rem;font-weight:700;color:var(--brand);background:var(--brand-light);border:0;padding:6px 14px;border-radius:20px;cursor:pointer;transition:var(--ease);text-transform:uppercase;letter-spacing:0.02em}
.pill-btn:hover{background:var(--brand);color:#fff;transform:scale(1.05)}

/* OBS DATA TABLE */
.obs-table{width:100%;border-collapse:collapse}
.obs-table th{padding:10px 6px;font-size:.68rem;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #f1f5f9}
.obs-table td{padding:10px 6px;font-size:.88rem}
.obs-table tbody tr:hover{background:rgba(248,250,252,.5)}
.text-right{text-align:right}
.brand-text{color:var(--brand)}
.total-label{font-size:.68rem;font-weight:800;color:var(--text2);text-transform:uppercase}
.total-val{font-size:.82rem;font-weight:800;color:var(--text)}
.lob-indicator{display:flex;align-items:center;gap:6px}
.lob-dot-sm{width:5px;height:5px;border-radius:50%}

/* BAR CHART */
.bar-chart-container{height:180px;display:flex;align-items:flex-end;gap:4px;padding-top:10px}
.bar-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1;height:100%;gap:4px}
.bar-fill{width:100%;max-width:20px;background:var(--red);border-radius:3px 3px 0 0;transition:height .6s ease;min-height:2px}
.bar-label{font-size:.6rem;font-weight:700;color:var(--text2);text-align:center;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* RECENT LIST */
.recent-list{display:flex;flex-direction:column;gap:8px}
.recent-item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;cursor:pointer;transition:var(--ease)}
.recent-item:hover{background:var(--bg)}
.avatar-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.7rem;flex-shrink:0}
.ri-info{flex:1;min-width:0}
.ri-name{font-weight:700;font-size:.88rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-meta{font-size:.72rem;color:var(--text3)}
.ri-score{text-align:right}
.ri-score-val{font-size:.92rem;font-weight:800;color:var(--brand)}
.ri-score-label{font-size:.6rem;font-weight:700;color:var(--text3);text-transform:uppercase}

/* DONUT */
.donut-area{position:relative;display:flex;justify-content:center;align-items:center;height:190px}
.donut-center{position:absolute;display:flex;flex-direction:column;align-items:center;pointer-events:none}
.donut-pct{font-size:1.8rem;font-weight:800;color:var(--text)}
.donut-label{font-size:.72rem;color:var(--text2)}
.legend-row{display:flex;justify-content:center;gap:14px;margin-top:4px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.68rem;font-weight:700;color:var(--text2);text-transform:uppercase}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* NEGLECTED */
.negl-item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;border:1px solid #f8fafc;transition:var(--ease)}
.negl-item+.negl-item{margin-top:8px}
.negl-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.72rem;flex-shrink:0}
.negl-info{flex:1;min-width:0}
.negl-name{font-weight:700;font-size:.88rem;color:var(--text)}
.negl-detail{font-size:.68rem;color:var(--text3)}
.negl-stat{text-align:right}
.negl-num{font-size:.92rem;font-weight:800;color:var(--red)}
.negl-label{font-size:.55rem;font-weight:700;color:var(--text3);text-transform:uppercase}

/* COMPLETION BARS */
.comp-bar-item{margin-bottom:14px}
.comp-bar-head{display:flex;justify-content:space-between;font-size:.88rem;margin-bottom:4px}
.comp-bar-name{font-weight:700;color:var(--text)}
.comp-bar-count{color:var(--text2)}
.comp-bar-track{height:8px;background:#f1f5f9;border-radius:99px;overflow:hidden}
.comp-bar-fill{height:100%;border-radius:99px;transition:width .8s ease}
.comp-bar-pct{display:flex;justify-content:flex-end;margin-top:3px}
.comp-badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.04)}

/* WOW TABLE */
.wow-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:4px;padding:6px 4px;font-size:.6rem;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.wow-col-agent{grid-column:span 1}
.wow-col{text-align:center}
.wow-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:4px;align-items:center;padding:7px 4px;border-radius:8px;transition:var(--ease)}
.wow-row:hover{background:var(--bg)}
.wow-agent{display:flex;align-items:center;gap:6px;min-width:0}
.wow-rank{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0}
.wow-name{font-size:.78rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wow-val{text-align:center;font-size:.82rem;font-weight:700}
.wow-indicator{font-size:.68rem;font-weight:800;padding:2px 6px;border-radius:5px;text-align:center}

/* VIEW HEADERS */
.view-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.view-title{font-size:1.5rem;font-weight:800}
.view-sub{color:var(--text2);margin-top:2px;font-size:.88rem}
.showing-badge{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:.82rem;color:var(--text2);box-shadow:var(--shadow)}
.dept-tabs{display:flex;gap:6px}
.dept-tab{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-weight:600;font-size:.82rem;color:var(--text2);cursor:pointer;transition:var(--ease);font-family:var(--font)}
.dept-tab:hover{background:var(--bg)}
.dept-tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}

/* TABLE CARD */
.table-card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.table-header-row{display:grid;grid-template-columns:1fr 80px 80px 80px 80px;gap:8px;padding:12px 16px;background:rgba(248,250,252,.8);border-bottom:1px solid #f1f5f9;font-size:.65rem;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.th-agent{padding-left:50px}
.th-stat{text-align:center}
.agent-row,.coach-row{display:grid;grid-template-columns:1fr 80px 80px 80px 80px;gap:8px;align-items:center;padding:12px 16px;border-bottom:1px solid #f8fafc;cursor:pointer;transition:var(--ease)}
.agent-row:hover,.coach-row:hover{background:rgba(239,244,255,.3)}
.row-left{display:flex;align-items:center;gap:10px;min-width:0}
.row-name{font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-detail{font-size:.75rem;color:var(--text3)}
.row-stat{text-align:center;font-size:.88rem;font-weight:700}
.row-stat.muted{color:var(--text3)}
.row-wow{display:flex;justify-content:flex-end}

/* HISTORY */
.history-header-row{display:grid;grid-template-columns:100px 1fr 1fr 100px 80px;gap:8px;padding:12px 16px;background:rgba(248,250,252,.8);border-bottom:1px solid #f1f5f9;font-size:.65rem;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.history-row{display:grid;grid-template-columns:100px 1fr 1fr 100px 80px;gap:8px;align-items:center;padding:12px 16px;border-bottom:1px solid #f8fafc;cursor:pointer;transition:var(--ease)}
.history-row:hover{background:rgba(239,244,255,.3)}
.h-id{font-size:.72rem;font-weight:800;color:var(--brand);background:var(--brand-light);padding:3px 8px;border-radius:4px;display:inline-block}
.h-name{font-weight:700;font-size:.88rem;color:var(--text)}
.h-coach{font-size:.88rem;color:var(--text2)}
.h-date{font-size:.88rem;color:var(--text3);text-align:center}
.lob-badge{font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:4px;text-transform:uppercase}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.15);width:100%;max-width:700px;max-height:85vh;display:flex;flex-direction:column;animation:modalUp .25s ease}
.obs-detail-box{max-width:800px}
@keyframes modalUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;background:rgba(248,250,252,.5);border-radius:16px 16px 0 0;flex-shrink:0}
.modal-head h2{font-size:1.2rem;font-weight:800}
.modal-sub{font-size:.78rem;color:var(--text2);margin-top:2px}
.close-btn{width:32px;height:32px;border-radius:50%;border:0;background:0;font-size:1.4rem;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--ease);flex-shrink:0}
.close-btn:hover{background:var(--bg);color:var(--text)}
.modal-body{flex:1;overflow-y:auto;padding:20px 22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:rgba(248,250,252,.3);border-radius:0 0 16px 16px;flex-shrink:0}
.btn-dark{padding:10px 24px;border-radius:10px;border:0;background:#0f172a;color:#fff;font-weight:700;font-size:.88rem;cursor:pointer;transition:var(--ease);font-family:var(--font)}
.btn-dark:hover{background:#000}
.btn-secondary{padding:10px 24px;border-radius:10px;border:0;background:0;color:var(--text2);font-weight:600;font-size:.88rem;cursor:pointer;transition:var(--ease);font-family:var(--font)}
.btn-secondary:hover{background:var(--bg)}

/* OBS DETAIL FIELDS */
.od-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
.od-field label{display:block;font-size:.68rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.od-field .od-val{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:.88rem;color:var(--text2);font-weight:500}
.od-text{margin-bottom:18px}
.od-text label{display:block;font-size:.68rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.od-text .od-val{background:rgba(248,250,252,.5);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:.88rem;color:var(--text);line-height:1.6;min-height:60px;white-space:pre-wrap}
.od-empty{color:var(--text3);font-style:italic}

/* COACH DETAIL */
.cd-header{display:flex;align-items:center;gap:14px}
.cd-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.1rem;flex-shrink:0}
.cd-name{font-size:1.1rem;font-weight:800}
.cd-dept{font-size:.82rem;color:var(--text2)}
.comp-mini{margin-top:14px;display:flex;align-items:center;gap:10px}
.comp-mini-track{flex:1;height:10px;background:#e2e8f0;border-radius:99px;overflow:hidden}
.comp-mini-fill{height:100%;border-radius:99px;transition:width .5s ease}
.comp-mini-text{font-size:.82rem;font-weight:700;white-space:nowrap}
.cd-agent{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;transition:var(--ease);cursor:pointer}
.cd-agent:hover{background:var(--bg)}
.cd-agent-name{flex:1;font-weight:600;font-size:.88rem}
.cd-status{font-size:.72rem;font-weight:600;padding:4px 10px;border-radius:99px}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(248,250,252,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px;transition:opacity .3s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay p{font-weight:600;color:var(--text2);font-size:.92rem}

/* RESPONSIVE */
@media(max-width:1100px){.dash-grid{grid-template-columns:1fr 1fr}}
@media(max-width:768px){
  .sidebar{position:fixed;left:-var(--sidebar-w);height:100vh;z-index:100}
  .sidebar.mobile-open{left:0}
  .mobile-close{display:block}
  .main-area{margin-left:0}
  .dash-grid{grid-template-columns:1fr}
  .table-header-row,.agent-row,.coach-row{grid-template-columns:1fr 60px 60px 60px 60px}
  .th-agent{padding-left:46px}
  .header-title .title-full{display:none}
  .od-grid{grid-template-columns:1fr}
}

/* TOOLTIP */
.tooltip{position:fixed;pointer-events:none;background:#1e293b;color:#fff;padding:6px 10px;border-radius:6px;font-size:.75rem;font-weight:500;box-shadow:0 10px 15px -3px rgba(0,0,0,.1);z-index:9999;opacity:0;transition:opacity .15s ease,transform .15s ease;transform:translateY(10px);white-space:nowrap}
.tooltip.show{opacity:1;transform:translateY(0)}

/* DRILL DOWN */
.history-item:hover{background:#f8fafc!important}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:6px;font-weight:600;cursor:pointer;transition:var(--ease)}
.btn-ghost:hover{background:var(--bg);color:var(--brand);border-color:var(--brand)}
.od-empty{color:var(--text3);font-style:italic}
.pagination-controls{padding:16px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(248,250,252,.5);border-radius:0 0 12px 12px}
.pag-info{font-size:.82rem;color:var(--text2);font-weight:500}
.pag-btns{display:flex;align-items:center;gap:12px}
.pag-cur{font-size:.82rem;font-weight:700;color:var(--text)}
.pagination-controls .btn-ghost{padding:6px 12px;font-size:.82rem}
.pagination-controls .btn-ghost:disabled{opacity:.4;cursor:not-allowed;background:transparent;border-color:var(--border);color:var(--text3)}

</style>
