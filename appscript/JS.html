<script>
// ===== INITIALIZATION =====
var AUTO_REFRESH_MS = 120000; // 2 minutes
var refreshTimer = null;
var isRefreshing = false;

document.addEventListener('DOMContentLoaded', function(){
  initSidebar();
  initNavigation();
  initSearch();
  initFilter();
  initModalCloseButtons();
  initRefresh();
  loadData();
  
  // Initialize AOS
  AOS.init({
    duration: 800,
    easing: 'ease-out-cubic',
    once: true,
    offset: 50
  });
});

function animateDashboardEntrance(){
  // Force a small delay to ensure DOM and layout are ready
  setTimeout(function() {
    var cards = document.querySelectorAll('#dashboardView .card');
    gsap.killTweensOf(cards); // Stop any previous animations
    gsap.set(cards, { opacity: 0, y: 30 });
    gsap.to(cards, {
      y: 0,
      opacity: 1,
      duration: 0.8,
      stagger: 0.1,
      ease: "back.out(1.2)",
      force3D: true
    });
  }, 50);
}

function initRefresh(){
  // Background refresh every 2 minutes
  refreshTimer = setInterval(function(){
    if(!isRefreshing) refreshData();
  }, AUTO_REFRESH_MS);
}

function refreshData(){
  if(isRefreshing) return;
  isRefreshing = true;
  var btn = document.getElementById('refreshBtn');
  if(btn) btn.classList.add('spinning');

  google.script.run
    .withFailureHandler(function(err){
      console.error('Refresh Error:', err);
      isRefreshing = false;
      if(btn) btn.classList.remove('spinning');
    })
    .withSuccessHandler(function(data){
      allObs = data.observations || [];
      AGENTS = data.staff || [];
      COACHES = data.coaches || [];
      
      updateLobCounts();
      if(currentView==='dashboard') {
        renderDashboard();
        animateDashboardEntrance();
      }
      else if(currentView==='agents') renderAgentsView(currentDept);
      else if(currentView==='coaches') renderCoachesView();
      else if(currentView==='history') renderHistoryView();
      
      isRefreshing = false;
      
      // Also hide initial loading overlay if still visible
      var overlay = document.getElementById('loadingOverlay');
      if(overlay) {
        gsap.to(overlay, {opacity: 0, duration: 0.5, onComplete: function(){
          overlay.classList.add('hidden');
          AOS.refresh();
        }});
      }
    })
    .getDashboardData();
}

function loadData(){
  // Initial load uses the same logic
  refreshData();
}

// ===== SIDEBAR =====
function initSidebar(){
  var sb=document.getElementById('sidebar');
  var ov=document.getElementById('sidebarOverlay');
  
  document.getElementById('hamburgerBtn').addEventListener('click',function(){
    sb.classList.toggle('mobile-open');
    ov.classList.toggle('show');
  });

  document.getElementById('mobileCloseBtn').addEventListener('click', function(){
    sb.classList.remove('mobile-open');
    ov.classList.remove('show');
  });

  ov.addEventListener('click', function(){
    sb.classList.remove('mobile-open');
    ov.classList.remove('show');
  });
}

function closeSidebar(){
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

// ===== NAVIGATION =====
var currentView='dashboard', currentDept='Sales';
function initNavigation(){
  // Observation toggle
  document.getElementById('navObservation').addEventListener('click',function(e){
    e.preventDefault();
    var sub=document.getElementById('obsSubmenu');
    sub.classList.toggle('open');
    this.classList.toggle('open');
  });

  // Sub-tabs
  document.querySelectorAll('.nav-sub-item').forEach(function(item){
    item.addEventListener('click',function(e){
      e.preventDefault();
      document.querySelectorAll('.nav-sub-item').forEach(function(i){i.classList.remove('active')});
      this.classList.add('active');
      var tab=this.getAttribute('data-subtab');
      switchView(tab);
      // Show/hide LOB children
      document.getElementById('lobChildren').style.display=tab==='agents'?'flex':'none';
      closeSidebar();
    });
  });

  // LOB items
  document.querySelectorAll('.nav-lob-item').forEach(function(item){
    item.addEventListener('click',function(e){
      e.preventDefault();
      document.querySelectorAll('.nav-lob-item').forEach(function(i){i.classList.remove('active')});
      this.classList.add('active');
      currentDept=this.getAttribute('data-dept');
      renderAgentsView(currentDept);
    });
  });

  // Dept tabs in agents view
  document.querySelectorAll('.dept-tab').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.dept-tab').forEach(function(b){b.classList.remove('active')});
      this.classList.add('active');
      currentDept=this.getAttribute('data-dept');
      renderAgentsView(currentDept);
      // Sync sidebar LOB
      document.querySelectorAll('.nav-lob-item').forEach(function(i){
        i.classList.toggle('active',i.getAttribute('data-dept')===currentDept);
      });
      closeSidebar();
    });
  });

  // History nav
  document.getElementById('navHistory').addEventListener('click',function(e){
    e.preventDefault();
    document.querySelectorAll('.nav-item').forEach(function(i){i.classList.remove('active')});
    this.classList.add('active');
    switchView('history');
    closeSidebar();
  });

  // View All buttons
  document.getElementById('viewAllRecentBtn').addEventListener('click',showRecentObsModal);
  document.getElementById('viewAllNeglectedBtn').addEventListener('click',showNeglectedModal);
  document.getElementById('viewRankingsBtn').addEventListener('click',showWowModal);
}

function switchView(view){
  var oldView = currentView;
  currentView=view;
  
  var panels = ['dashboardView','agentsView','coachesView','historyView'];
  panels.forEach(function(id){
    document.getElementById(id).classList.remove('active');
  });
  
  var targetId = view + 'View';
  var targetEl = document.getElementById(targetId);
  if(targetEl) {
    targetEl.classList.add('active');
    gsap.fromTo(targetEl, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" });
  }

  if(view==='dashboard'){
    renderDashboard();
    animateDashboardEntrance();
  }else if(view==='agents'){
    renderAgentsView(currentDept);
  }else if(view==='coaches'){
    renderCoachesView();
  }else if(view==='history'){
    renderHistoryView();
  }
  
  // Refresh AOS for the new view after animations
  setTimeout(function(){ 
    AOS.refresh(); 
  }, 500);
  
  // Update nav active state
  var obsNav=document.getElementById('navObservation');
  var histNav=document.getElementById('navHistory');
  if(view==='history'){
    obsNav.classList.remove('active');
    histNav.classList.add('active');
  }else{
    obsNav.classList.add('active');
    histNav.classList.remove('active');
  }
}

function changeHistoryPage(delta){
  historyPage += delta;
  renderHistoryView();
  // Scroll to top of list
  document.querySelector('.main-area').scrollTop = 0;
}

// ===== SEARCH =====
function initSearch(){
  var input=document.getElementById('searchInput');
  var results=document.getElementById('searchResults');
  input.addEventListener('input',function(){
    var q=this.value.toLowerCase().trim();
    if(!q){results.classList.remove('show');return}
    var items=[];
    // Search agents
    AGENTS.forEach(function(a){
      if(a.name.toLowerCase().includes(q)||a.coach.toLowerCase().includes(q)){
        items.push({type:'agent',name:a.name,path:a.lob+' > '+a.coach+' > '+a.name,lob:a.lob});
      }
    });
    // Search coaches
    COACHES.forEach(function(c){
      if(c.name.toLowerCase().includes(q)){
        items.push({type:'coach',name:c.name,path:c.dept+' > '+c.name});
      }
    });
    // Search depts
    ['Sales','Support','Specialty'].forEach(function(d){
      if(d.toLowerCase().includes(q))items.push({type:'dept',name:d,path:d});
    });
    items=items.slice(0,10);
    if(!items.length){results.classList.remove('show');return}
    var colors={agent:'background:#ecfdf5;color:#059669',coach:'background:#fffbeb;color:#d97706',dept:'background:#eff6ff;color:#2563eb'};
    results.innerHTML=items.map(function(r){
      return '<div class="sr-item" data-type="'+r.type+'" data-name="'+r.name+'" data-lob="'+(r.lob||'')+'"><div style="display:flex;justify-content:space-between;align-items:center"><span class="sr-name">'+r.name+'</span><span class="sr-badge" style="'+colors[r.type]+'">'+r.type+'</span></div><div class="sr-path">'+r.path+'</div></div>';
    }).join('');
    results.classList.add('show');
    results.querySelectorAll('.sr-item').forEach(function(el){
      el.addEventListener('click',function(){
        var type=this.getAttribute('data-type');
        var name=this.getAttribute('data-name');
        input.value='';results.classList.remove('show');
        if(type==='dept'){currentDept=name;switchView('agents')}
        else if(type==='coach'){showCoachDetail(name)}
        else if(type==='agent'){showAgentHistory(name)}
      });
    });
  });
  document.addEventListener('click',function(e){
    if(!document.getElementById('searchBox').contains(e.target))results.classList.remove('show');
  });
}

// ===== FILTER =====
function initFilter(){
  var periods=['Today','Yesterday','Past week','Month to date','Past 4 weeks','Past 12 weeks','Year to date','All Time'];
  var menu=document.getElementById('filterMenu');
  menu.innerHTML=periods.map(function(p){
    var active=p===filterPeriod?' active':'';
    return '<div class="fm-item'+active+'" data-period="'+p+'"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>'+p+'</span><svg class="fm-check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>';
  }).join('');

  document.getElementById('filterBtn').addEventListener('click',function(e){
    e.stopPropagation();menu.classList.toggle('show');
  });
  menu.querySelectorAll('.fm-item').forEach(function(item){
    item.addEventListener('click',function(){
      filterPeriod=this.getAttribute('data-period');
      document.getElementById('filterLabel').textContent=filterPeriod;
      menu.querySelectorAll('.fm-item').forEach(function(i){i.classList.remove('active')});
      this.classList.add('active');
      menu.classList.remove('show');
      historyPage = 1; // Reset pagination
      // Re-render current view
      if(currentView==='dashboard')renderDashboard();
      else if(currentView==='agents')renderAgentsView(currentDept);
      else if(currentView==='coaches')renderCoachesView();
      else if(currentView==='history')renderHistoryView();
    });
  });
  document.addEventListener('click',function(e){
    if(!document.getElementById('filterDropdown').contains(e.target))menu.classList.remove('show');
  });
}

// ===== MODAL CLOSE BUTTONS =====
function initModalCloseButtons(){
  // Click overlay to close
  document.querySelectorAll('.modal-overlay').forEach(function(overlay){
    overlay.addEventListener('click',function(e){
      if(e.target===this)this.classList.remove('show');
    });
  });
}

// ===== TOOLTIP =====
function showTooltip(text, x, y){
  var el=document.getElementById('tooltip');
  if(!el)return;
  el.textContent=text;
  el.classList.add('show');
  var rect=el.getBoundingClientRect();
  el.style.left=(x-rect.width/2)+'px';
  el.style.top=(y-rect.height-10)+'px';
}
function hideTooltip(){
  var el=document.getElementById('tooltip');
  if(el)el.classList.remove('show');
}
</script>
