<script>
// ===== DASHBOARD RENDERING =====
var _dashTweens = []; // Track all active dashboard GSAP tweens
var _dashRenderTimer = null; // Debounce timer

function _killDashboardTweens(){
  // Kill all tracked tweens from the previous render cycle
  _dashTweens.forEach(function(tw){ if(tw && tw.kill) tw.kill(); });
  _dashTweens = [];
  // Also kill tweens stored on canvas elements
  var tc = document.getElementById('trendChart');
  var dc = document.getElementById('completionDonut');
  if(tc && tc._gsapTrend){ tc._gsapTrend.kill(); tc._gsapTrend = null; }
  if(dc && dc._gsapDonut){ dc._gsapDonut.kill(); dc._gsapDonut = null; }
  // Kill any gsapCount tweens
  var totalEl = document.getElementById('obsDataTotal');
  var pctEl = document.getElementById('overallPct');
  if(totalEl && totalEl._gsapCount){ totalEl._gsapCount.kill(); totalEl._gsapCount = null; }
  if(pctEl && pctEl._gsapCount){ pctEl._gsapCount.kill(); pctEl._gsapCount = null; }
}

function _trackTween(tw){
  if(tw) _dashTweens.push(tw);
  return tw;
}

function renderDashboard(){
  // Debounce: collapse rapid calls into one render
  if(_dashRenderTimer) clearTimeout(_dashRenderTimer);
  _dashRenderTimer = setTimeout(_doRenderDashboard, 80);
}

function _doRenderDashboard(){
  _dashRenderTimer = null;
  // Kill all previous animations before re-rendering
  _killDashboardTweens();

  var fd=getFilterDates(), ws=getWeekStats();
  renderObsDataTable(fd);
  renderMissingChart(fd);
  renderRecentList();
  renderTrendChart(fd);
  renderCompletionDonut(fd);
  renderNeglectedList(fd,ws);
  renderCompletionBars(fd);
  renderTopScoresTable(fd,ws);
}

function renderObsDataTable(fd){
  var lobs=['Sales','Support','Specialty'], total=0, html='';
  lobs.forEach(function(lob){
    var dots={Sales:'#4F7DF3',Support:'#10B981',Specialty:'#F59E0B'};
    var cnt=allObs.filter(function(o){
      if(!o.department.includes(lob))return false;
      if(fd.start&&o.date<fd.start)return false;
      if(fd.end&&o.date>fd.end)return false;
      return true;
    }).length;
    total+=cnt;
    html+='<tr><td><div class="lob-indicator"><span class="lob-dot-sm" style="background:'+dots[lob]+'"></span><strong>'+lob+'</strong></div></td><td class="text-right" style="font-weight:800;color:#4F7DF3">'+cnt+'</td></tr>';
  });
  document.getElementById('obsDataBody').innerHTML=html;
  gsapCount(document.getElementById('obsDataTotal'), total);
}

function renderMissingChart(fd){
  var coachMissed={};
  var filteredAgents = AGENTS.filter(function(a){
    return a.lob === missingChartLob;
  });
  filteredAgents.forEach(function(a){
    var has=allObs.some(function(o){
      return o.agentName===a.name&&(!fd.start||o.date>=fd.start)&&(!fd.end||o.date<=fd.end);
    });
    if(!has){coachMissed[a.coach]=(coachMissed[a.coach]||0)+1}
  });
  var entries=Object.entries(coachMissed).sort(function(a,b){return b[1]-a[1]}).slice(0,8);
  var max=entries.length?entries[0][1]:1;
  var el=document.getElementById('missingChart');
  if(!entries.length){el.innerHTML='<div style="text-align:center;color:#94a3b8;padding:40px;font-style:italic">No missing data</div>';return}
  el.innerHTML=entries.map(function(e){
    var pct=Math.max(8,Math.round((e[1]/max)*100));
    var parts=e[0].split(' ');
    var label=parts.length>1?parts[parts.length-1]:parts[0];
    var tip = e[0] + ': ' + e[1] + ' missed';
    return '<div class="bar-col" onmouseenter="showTooltip(\''+tip+'\', event.clientX, event.clientY)" onmouseleave="hideTooltip()">' +
      '<div class="bar-val" style="font-size:.7rem;font-weight:800;color:#EF4444;margin-bottom:2px;opacity:0">'+e[1]+'</div>' +
      '<div class="bar-fill" style="height:0%;" data-h="'+pct+'"></div>' +
      '<div class="bar-label" style="font-size:.65rem;font-weight:700;color:var(--text2);margin-top:4px">'+label+'</div></div>';
  }).join('');

  // Animate bars and values (tracked for cleanup)
  _trackTween(gsap.to(el.querySelectorAll('.bar-fill'), {
    height: function(i, target) { return target.getAttribute('data-h') + '%'; },
    duration: 1.2,
    stagger: 0.08,
    ease: "power2.out"
  }));
  _trackTween(gsap.to(el.querySelectorAll('.bar-val'), {
    opacity: 1,
    duration: 0.5,
    delay: 0.8
  }));
}

function renderRecentList(){
  var recent=allObs.slice(0,3);
  var el=document.getElementById('recentList');
  if(!recent.length){el.innerHTML='<div style="text-align:center;color:#94a3b8;padding:20px;font-style:italic">No recent observations</div>';return}
  el.innerHTML=recent.map(function(o){
    var scoreVal=typeof o.rating==='number'?o.rating+'%':(o.rating||'N/A');
    var scoreColor=o.rating>=85?'#10B981':o.rating>=60?'#F59E0B':'#4F7DF3';
    return '<div class="recent-item" onclick="showAgentHistory(\''+o.agentName.replace(/'/g,"\\'")+'\')">' +
      avatarHTML(o.agentName,40) +
      '<div class="ri-info">' +
        '<div class="ri-name">'+o.agentName+'</div>' +
        '<div class="ri-meta">By <strong>'+o.coachName+'</strong> • '+o.date+'</div>' +
      '</div>' +
      '<div class="ri-score">' +
        '<div class="ri-score-val" style="color:'+scoreColor+'">'+scoreVal+'</div>' +
        '<div class="ri-score-label">Rating</div>' +
      '</div></div>';
  }).join('');
}

function renderTrendChart(fd){
  var canvas=document.getElementById('trendChart');
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var dpr=window.devicePixelRatio||1;
  var container = canvas.parentElement;
  var rect = container.getBoundingClientRect();
  
  // Use clientWidth to get internal width excluding padding
  var w = container.clientWidth || 400;
  var h = 220; // Fixed height for trend chart
  
  var targetW = Math.floor(w * dpr);
  var targetH = Math.floor(h * dpr);
  
  if (canvas.width !== targetW || canvas.height !== targetH) {
    canvas.width = targetW;
    canvas.height = targetH;
    canvas.style.width = '100%';
    canvas.style.height = h + 'px';
  }
  
  // Always reset and scale since we might have skipped resizing
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);

  var dateMap={}, filtered=allObs.filter(function(o){
    return (!fd.start||o.date>=fd.start)&&(!fd.end||o.date<=fd.end);
  });
  filtered.forEach(function(o){
    if(!dateMap[o.date])dateMap[o.date]={Sales:0,Support:0,Specialty:0};
    if(o.department.includes('Sales'))dateMap[o.date].Sales++;
    if(o.department.includes('Support'))dateMap[o.date].Support++;
    if(o.department.includes('Specialty'))dateMap[o.date].Specialty++;
  });
  var dates=Object.keys(dateMap).sort();
  if(dates.length<1){
    ctx.fillStyle='#94a3b8';ctx.font='12px Inter';ctx.textAlign='center';
    ctx.fillText('Not enough data for trend',w/2,h/2);
    return;
  }
  var max=1;dates.forEach(function(d){max=Math.max(max,dateMap[d].Sales,dateMap[d].Support,dateMap[d].Specialty)});

  var draw = function(progress) {
    ctx.clearRect(0, 0, w, h);
    var pad={l:40,r:20,t:25,b:40};
    var cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
    var xStep=dates.length>1?cw/(dates.length-1):0;

    // Grid + Y-Labels
    ctx.strokeStyle='#f1f5f9';ctx.lineWidth=1;
    ctx.fillStyle='#94a3b8';ctx.font='10px Inter';ctx.textAlign='right';
    for(var i=0;i<=4;i++){
      var yPos=pad.t+(ch/4)*i;
      ctx.beginPath();ctx.moveTo(pad.l,yPos);ctx.lineTo(w-pad.r,yPos);ctx.stroke();
      ctx.fillText(Math.round(max-max*(i/4)),pad.l-8,yPos+3);
    }
    
    // X-Labels
    ctx.textAlign='center';
    var step=Math.max(1,Math.floor(dates.length/6));
    dates.forEach(function(d,i){
      if(i%step===0){
        var xPos=pad.l+xStep*i;
        ctx.fillText(d.slice(5),xPos,h-22);
      }
    });

    // Legends
    ctx.textAlign='left';
    var colors={Sales:'#4F7DF3',Support:'#10B981',Specialty:'#F59E0B'};
    var legendX=pad.l;
    ['Sales','Support','Specialty'].forEach(function(key){
      ctx.fillStyle=colors[key];
      ctx.beginPath();ctx.arc(legendX,h-8,4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#64748b';ctx.fillText(key,legendX+10,h-5);
      legendX+=ctx.measureText(key).width+28;
    });

    // Lines
    ['Sales','Support','Specialty'].forEach(function(key){
      ctx.strokeStyle=colors[key];ctx.lineWidth=2.5;ctx.beginPath();
      dates.forEach(function(d,i){
        var x=pad.l+xStep*i;
        var y=pad.t+ch-(dateMap[d][key]/max)*ch;
        var pointProgress = i / (dates.length - 1 || 1);
        if (pointProgress <= progress) {
          i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
        }
      });
      ctx.stroke();
      
      // Points
      if(progress > 0.9) {
        dates.forEach(function(d,i){
          var x=pad.l+xStep*i, y=pad.t+ch-(dateMap[d][key]/max)*ch;
          var alpha = Math.min(1, (progress - 0.9) * 10);
          ctx.globalAlpha = alpha;
          ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=colors[key];ctx.fill();
          ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
        });
        ctx.globalAlpha = 1;
      }
    });
  };

  // Kill any existing animation on this canvas before starting a new one
  if (canvas._gsapTrend) canvas._gsapTrend.kill();
  
  canvas._gsapTrend = gsap.to({p:0}, {
    p: 1,
    duration: 1.5,
    ease: "power2.inOut",
    onUpdate: function() { draw(this.targets()[0].p); }
  });
  
  canvas.onmousemove = function(e){
    var r = canvas.getBoundingClientRect();
    var mx = (e.clientX - r.left), my = (e.clientY - r.top);
    var pad={l:40,r:20,t:25,b:40};
    var cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
    var xStep=dates.length>1?cw/(dates.length-1):0;
    var found=false;
    ['Sales','Support','Specialty'].forEach(function(key){
      dates.forEach(function(d,i){
        var x=pad.l+xStep*i, y=pad.t+ch-(dateMap[d][key]/max)*ch;
        if(Math.sqrt((x-mx)**2+(y-my)**2)<10){
          showTooltip(key+' ('+d+'): '+dateMap[d][key], e.clientX, e.clientY);
          found=true;
        }
      });
    });
    if(!found) hideTooltip();
  };
}

function renderCompletionDonut(fd){
  var canvas=document.getElementById('completionDonut');
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var dpr=window.devicePixelRatio||1;
  canvas.width=180*dpr;canvas.height=180*dpr;canvas.style.width='180px';canvas.style.height='180px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr,dpr);

  var periodObs=allObs.filter(function(o){if(fd.start&&o.date<fd.start)return false;if(fd.end&&o.date>fd.end)return false;return true});
  var observed=new Set(periodObs.map(function(o){return o.agentName}));
  var lobs=[{name:'Sales',color:'#4F7DF3'},{name:'Support',color:'#10B981'},{name:'Specialty',color:'#F59E0B'}];
  var stats=lobs.map(function(l){
    var total=AGENTS.filter(function(a){return a.lob===l.name}).length;
    var obs=AGENTS.filter(function(a){return a.lob===l.name&&observed.has(a.name)}).length;
    return{name:l.name,color:l.color,total:total,obs:obs,pct:total>0?Math.round(obs/total*100):0};
  });

  var draw = function(progress) {
    ctx.clearRect(0, 0, 180, 180);
    var cx=90,cy=90,r=70,ir=48;
    var startAngle=-Math.PI/2;
    var totalPct = stats.reduce(function(a,s){return a+s.pct},0) || 1;
    
    stats.forEach(function(s){
      var slice=(s.pct/totalPct)*Math.PI*2 * progress;
      ctx.beginPath();
      ctx.arc(cx,cy,r,startAngle,startAngle+slice);
      ctx.arc(cx,cy,ir,startAngle+slice,startAngle,true);
      ctx.closePath();
      ctx.fillStyle=s.color;ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
      startAngle+=slice;
    });
  };

  // Kill any existing animation on this canvas
  if (canvas._gsapDonut) canvas._gsapDonut.kill();

  canvas._gsapDonut = gsap.to({p:0}, {
    p: 1,
    duration: 1.2,
    ease: "elastic.out(1, 0.75)",
    onUpdate: function() { draw(this.targets()[0].p); }
  });

  var overall=AGENTS.length>0?Math.round(observed.size/AGENTS.length*100):0;
  gsapCount(document.getElementById('overallPct'), overall, "%"); 
  
  document.getElementById('completionLegend').innerHTML=stats.map(function(s){
    return '<div class="legend-item"><span class="legend-dot" style="background:'+s.color+'"></span>'+s.name+'</div>';
  }).join('');
  window._lobStats=stats;
}

function renderNeglectedList(fd,ws){
  var missed=AGENTS.map(function(a){
    var has=allObs.some(function(o){return o.agentName===a.name&&(!fd.start||o.date>=fd.start)&&(!fd.end||o.date<=fd.end)});
    var total=allObs.filter(function(o){return o.agentName===a.name}).length;
    return{name:a.name,coach:a.coach,lob:a.lob,missed:!has,totalMissed:has?0:1,obsCount:total};
  }).filter(function(a){return a.missed}).sort(function(a,b){return a.obsCount-b.obsCount}).slice(0,3);

  var el=document.getElementById('neglectedList');
  if(!missed.length){el.innerHTML='<div style="text-align:center;color:#94a3b8;padding:20px;font-style:italic">No data available</div>';return}
  var rankColors=['background:#fee2e2;color:#dc2626','background:#ffedd5;color:#ea580c','background:#fef3c7;color:#d97706'];
  el.innerHTML=missed.map(function(a,i){
    return '<div class="negl-item" onclick="showAgentHistory(\''+a.name.replace(/'/g,"\\'")+'\')"><div class="negl-rank" style="'+rankColors[i]+'">'+(i+1)+'</div><div class="negl-info"><div class="negl-name">'+a.name+'</div><div class="negl-detail">Coach: '+a.coach+' • '+a.lob+'</div></div><div class="negl-stat"><div class="negl-num">'+a.totalMissed+'</div><div class="negl-label">Missed</div></div></div>';
  }).join('');
}

function renderCompletionBars(fd){
  var stats=window._lobStats||[];
  var el=document.getElementById('completionBars');
  el.innerHTML=stats.map(function(s){
    var badgeStyle=s.pct===100?'background:#ecfdf5;color:#059669;border:1px solid #a7f3d0':'background:#f8fafc;color:#64748b;border:1px solid #e2e8f0';
    return '<div class="comp-bar-item">' +
      '<div class="comp-bar-head"><span class="comp-bar-name">'+s.name+'</span><span class="comp-bar-count">'+s.obs+' / '+s.total+'</span></div>' +
      '<div class="comp-bar-track"><div class="comp-bar-fill" style="width:0%;background:'+s.color+'" data-w="'+s.pct+'"></div></div>' +
      '<div class="comp-bar-pct"><span class="comp-badge" style="'+badgeStyle+'">'+s.pct+'% COMPLETE</span></div></div>';
  }).join('');

  // Animate fills (tracked for cleanup)
  _trackTween(gsap.to(el.querySelectorAll('.comp-bar-fill'), {
    width: function(i, target) { return target.getAttribute('data-w') + '%'; },
    duration: 1,
    stagger: 0.1,
    ease: "power2.out"
  }));
}

function renderTopScoresTable(fd,ws){
  var stats=AGENTS.map(function(a){
    var periodObs = allObs.filter(function(o){
      if(o.agentName !== a.name) return false;
      if(fd.start && o.date < fd.start) return false;
      if(fd.end && o.date > fd.end) return false;
      return true;
    });
    var count = periodObs.length;
    var avg = count > 0 ? Math.round(periodObs.reduce(function(acc, o){ return acc + (o.rating || 0); }, 0) / count) : 0;
    return { name: a.name, count: count, avg: avg };
  }).filter(function(s){ return s.count > 0; })
    .sort(function(a,b){ return b.avg - a.avg || b.count - a.count; })
    .slice(0, 10);

  var el=document.getElementById('wowList');
  if(!stats.length){el.innerHTML='<div style="text-align:center;color:#94a3b8;padding:20px;font-style:italic">No performance data</div>';return}
  el.innerHTML=stats.map(function(s,i){
    var rc=i<3?'background:#ecfdf5;color:#059669':'background:#f1f5f9;color:#64748b';
    var scoreColor=s.avg>=90?'#10B981':s.avg>=80?'#4F7DF3':'#64748b';
    return '<div class="wow-row" onclick="showAgentHistory(\''+s.name.replace(/'/g,"\\'")+'\')">' +
      '<div class="wow-agent"><div class="wow-rank" style="'+rc+'">'+(i+1)+'</div><span class="wow-name">'+s.name+'</span></div>' +
      '<div class="wow-val" style="color:#94a3b8;font-size:0.75rem">'+s.count+' Obs</div>' +
      '<div class="text-right" style="font-weight:800;color:'+scoreColor+'">'+s.avg+'%</div></div>';
  }).join('');
}
</script>
