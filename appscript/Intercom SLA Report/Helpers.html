  },

// ===== UTILITIES =====
function parsePct(v){ return parseFloat(String(v).replace('%','')) || 0; }

function calcAbandonRate(inbound, abandoned) {
  var i = parseFloat(String(inbound).replace(/,/g,'')) || 0;
  var a = parseFloat(String(abandoned).replace(/,/g,'')) || 0;
  return i > 0 ? (a/i*100).toFixed(1) + '%' : '0.0%';
}

function getSLAStatus(slaStr, type) {
  var v = parsePct(slaStr);
  var target = type === 'chat' ? slaTargets.chat : slaTargets.voice;
  return (v >= target) ? 'good' : 'alert';
}

function calcEfficiency(lob, channel) {
  var d = slaData[lob][channel];
  var inb = parseFloat(String(d.inbound).replace(/,/g,'')) || 0;
  var abd = parseFloat(String(d.abandoned || 0).replace(/,/g,'')) || 0;
  var solved = inb - abd;
  var present = (d.activeCount || 0) - (d.absentCount || 0);
  if (present <= 0) return '0.0';
  return (solved / present).toFixed(1);
}

function renderWow(val, lob, channel, field) {
  if (!sdldData || !sdldData[lob] || !sdldData[lob][channel]) return '';
  var prev = sdldData[lob][channel][field];
  var v1 = parsePct(val);
  var v2 = parsePct(prev);
  if (v1 === v2) return '';
  var isUp = v1 > v2;
  var cls = isUp ? 'up' : 'down';
  var arrow = isUp ? '▲' : '▼';
  var diff = Math.abs(v1 - v2).toFixed(1);
  return '<span class="wow-indicator ' + cls + '" title="WoW: ' + prev + '"><span class="wow-arrow">' + arrow + '</span>' + diff + '%</span>';
}

function updateLobMetric(lob, channel, field, value) {
  slaData[lob][channel][field] = value;
  var ch = slaData[lob][channel];
  if (field === 'inbound' || field === 'abandoned') {
    ch.abandonRate = calcAbandonRate(ch.inbound, ch.abandoned);
  }
  if (field === 'sla') {
    ch.status = getSLAStatus(value, channel === 'chat' ? 'chat' : 'voice');
  }
}

// ===== TIME =====
function updateTime() {
  var now = new Date();
  var timeStr = now.toLocaleTimeString('en-US', { timeZone:'America/Los_Angeles', hour:'numeric', hour12:true });
  var parts = timeStr.split(' ');
  var hour = parts[0].split(':')[0];
  var period = parts[1] || 'PST';
  var el = document.getElementById('reportTime');
  if (el) el.textContent = 'Time of Report: ' + hour + ':00 ' + period + ' PST';
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  var m = document.getElementById('toastMsg');
  if (!t || !m) return;
  m.textContent = msg;
  t.className = 'toast show';
  setTimeout(function(){ t.className = 'toast'; }, 3500);
}
